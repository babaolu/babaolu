name: AI Profile Update

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday at 04:00 UTC
  workflow_dispatch:        # Manual trigger from the Actions tab

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit README.md changes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate AI profile
        env:
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER:    ${{ github.repository_owner }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_profile.py

      - name: Commit and push if README changed
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh AI profile [bot]"
            git push
          fi
